<!DOCTYPE html>
<html lang='zh-CN'>
<head>
  <meta charset='utf-8'/>
  <meta name='viewport' content='width=device-width, initial-scale=1.0' />
  <link rel='icon' href='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text x=%2250%%22 y=%2250%%22 style=%22dominant-baseline:central;text-anchor:middle;font-size:90px;%22>⚙️</text></svg>' />
  <link rel='stylesheet' href='https://downloads.immortalwrt.org/openwrt.css' />
  <title>自编译的 ImmortalWrt 固件</title>
  <style>
    .copy-btn {
      cursor: pointer;
      margin-left: 5px;
      display: inline-block;
      transition: all 0.2s ease;
    }
    .copy-btn:active {
      transform: scale(0.9);
      opacity: 0.7;
    }
    .copy-btn.success {
      color: #4CAF50;
      transform: scale(1.2);
      animation: pop 0.3s ease-in-out;
    }
    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .search-input {
      width: 100%;
      padding: 5px 15px;
      margin-bottom: 5px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      font-size: 16px;
      outline: none;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }
    .search-input:focus {
      border-color: #007bff;
      box-shadow: 0 0 5px rgba(0, 123, 255, 0.5);
    }
  </style>
  <script>
    function copyToClipboard(sha, btnElement) {
      if (navigator.clipboard) {
        navigator.clipboard.writeText(sha)
          .then(() => {
            btnElement.textContent = '✅';
            btnElement.classList.add('success');
            setTimeout(() => {
              btnElement.textContent = '📋';
              btnElement.classList.remove('success');
            }, 1000);
          })
          .catch(() => showTooltip('复制失败', event));
      } else {
        prompt('请手动复制完整 SHA256：', sha);
      }
    }
    function showTooltip(text, e) {
      const tooltip = document.getElementById('tooltip');
      tooltip.textContent = text;
      tooltip.style.display = 'block';
      tooltip.style.left = (e.clientX + 10) + 'px';
      tooltip.style.top = (e.clientY + 10) + 'px';
      setTimeout(() => tooltip.style.display = 'none', 1000);
    }
  </script>
</head>
<body>
<div class='container'>
<input type='text' id='globalSearch' placeholder='全局搜索...' class='search-input' onkeyup="if(event.key==='Enter' && this.value.trim()){window.location.href='/search.html?q='+encodeURIComponent(this.value.trim());}">
